<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Interactivo DUA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  :root {
    --bg: #f8fafc; --text: #1e293b; --primary: #4f46e5; --secondary: #10b981;
    --card: #ffffff; --border: #e2e8f0; --shadow: 0 10px 25px rgba(0,0,0,0.05);
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0f172a; --text: #f8fafc; --card: #1e293b; --border: #334155; }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 2rem 1rem; }
  
  .wizard { background: var(--card); border: 1px solid var(--border); border-radius: 24px; width: 100%; max-width: 600px; padding: 2rem; box-shadow: var(--shadow); text-align: center; }
  
  .avatar-header { margin-bottom: 1.5rem; }
  .avatar-header img { width: 120px; height: auto; border-radius: 50%; }

  .progress { height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 2rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--primary); width: 14%; transition: width 0.3s; }

  .step { display: none; animation: slideIn 0.3s ease-out; }
  .step.active { display: block; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  h2 { font-size: 1.4rem; margin-bottom: 1.5rem; font-weight: 700; }
  input, select { width: 100%; padding: 12px; margin-bottom: 1rem; border: 2px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); font-size: 1rem; outline: none; }
  input:focus { border-color: var(--primary); }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .option-btn { padding: 15px; border: 2px solid var(--border); border-radius: 12px; background: transparent; color: var(--text); cursor: pointer; font-weight: 600; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
  .option-btn.selected { border-color: var(--primary); background: rgba(79, 70, 229, 0.1); }
  .icon { font-size: 2rem; margin-bottom: 5px; }

  .nav-btns { display: flex; justify-content: space-between; margin-top: 1.5rem; }
  button.nav { padding: 10px 20px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; }
  .next { background: var(--primary); color: white; }
  .next:disabled { opacity: 0.5; }
  .back { background: var(--border); color: var(--text); }

  .summary { background: rgba(16, 185, 129, 0.1); padding: 1.5rem; border-radius: 16px; margin-bottom: 1rem; text-align: left; }
  .summary p { margin-bottom: 8px; font-size: 0.95rem; }
  canvas { width: 100%; background: var(--bg); border-radius: 12px; margin-top: 10px; border: 1px solid var(--border); }
</style>
</head>
<body>

<div class="wizard">
  <div class="avatar-header">
    <img src="./../img/me.gif" alt="Avatar">
  </div>
  
  <div class="progress"><div class="progress-fill" id="bar"></div></div>

  <div class="step active" id="s1">
    <h2>¿Cómo te llamas?</h2>
    <input type="text" id="nombre" placeholder="Tu nombre" oninput="val(1)">
  </div>

  <div class="step" id="s2">
    <h2 id="saludo">Elige un producto</h2>
    <div class="grid">
      <button class="option-btn" onclick="sel('Laptop','💻',this)"><span class="icon">💻</span>Laptop</button>
      <button class="option-btn" onclick="sel('Auto','🚗',this)"><span class="icon">🚗</span>Auto</button>
      <button class="option-btn" onclick="sel('Viaje','🏖️',this)"><span class="icon">🏖️</span>Viaje</button>
      <button class="option-btn" onclick="sel('Celular','📱',this)"><span class="icon">📱</span>Celular</button>
    </div>
  </div>

  <div class="step" id="s3">
    <h2>¿Cuánto y cada cuánto pagarás?</h2>
    <input type="number" id="renta" placeholder="Monto del pago $" oninput="val(3)">
    <select id="freq"><option>Mensual</option><option>Semanal</option><option>Anual</option></select>
  </div>

  <div class="step" id="s4">
    <h2>Tasa de interés (%)</h2>
    <input type="number" id="tasa" placeholder="Ej. 5" oninput="val(4)">
  </div>

  <div class="step" id="s5">
    <h2>¿Cuántos pagos harás? (n)</h2>
    <input type="number" id="n" placeholder="Ej. 12" oninput="val(5)">
  </div>

  <div class="step" id="s6">
    <h2>¿En qué periodo inicias a pagar? (k)</h2>
    <input type="number" id="k" placeholder="Ej. 4" oninput="val(6)">
  </div>

  <div class="step" id="s7">
    <h2 id="res-title">¡Felicidades!</h2>
    <div class="summary" id="res-body"></div>
    <canvas id="grafica" height="180"></canvas>
  </div>

  <div class="nav-btns" id="nav">
    <button class="nav back" id="btnB" onclick="change(-1)" style="display:none">Atrás</button>
    <button class="nav next" id="btnN" onclick="change(1)" disabled>Siguiente</button>
  </div>
</div>

<script>
let step = 1;
const state = { n: '', e: '', r: 0, f: '', i: 0, np: 0, k: 0 };

function val(s) {
  let v = false;
  if(s==1) v = document.getElementById('nombre').value.length > 2;
  if(s==3) v = document.getElementById('renta').value > 0;
  if(s>=4) v = document.querySelector('.active input').value > 0;
  document.getElementById('btnN').disabled = !v;
}

function sel(p, e, b) {
  state.p = p; state.e = e;
  document.querySelectorAll('.option-btn').forEach(x => x.classList.remove('selected'));
  b.classList.add('selected');
  document.getElementById('btnN').disabled = false;
}

function change(dir) {
  step += dir;
  document.querySelectorAll('.step').forEach((s, i) => s.classList.toggle('active', i+1 == step));
  document.getElementById('bar').style.width = (step/7)*100 + '%';
  document.getElementById('btnB').style.display = step > 1 ? 'block' : 'none';
  
  if(step == 2) document.getElementById('saludo').innerText = `Hola ${document.getElementById('nombre').value}, elige un producto:`;
  if(step == 7) finish();
  else val(step);
}

function finish() {
  document.getElementById('nav').style.display = 'none';
  
  // Capturar datos
  state.n = document.getElementById('nombre').value;
  state.r = parseFloat(document.getElementById('renta').value);
  state.f = document.getElementById('freq').value;
  state.i = parseFloat(document.getElementById('tasa').value);
  state.np = parseInt(document.getElementById('n').value);
  state.k = parseInt(document.getElementById('k').value);

  document.getElementById('res-title').innerText = `¡Listo, ${state.n}!`;
  document.getElementById('res-body').innerHTML = `
    <p><b>Producto:</b> ${state.e} ${state.p}</p>
    <p><b>Pago:</b> $${state.r.toLocaleString()} ${state.f}</p>
    <p><b>Interés:</b> ${state.i}%</p>
    <p><b>Gracia:</b> ${state.k} ${state.f.toLowerCase()}s</p>
    <p><b>Total pagos:</b> ${state.np} periodos</p>
  `;

  confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
  
  // Simular flujos VISUALES
  simulateVisualFlow();
  draw();
}

// 🎨 Simulación VISUAL simple
function simulateVisualFlow() {
  state.flujos = [];
  
  // Períodos de gracia (sin pago)
  for(let p = 1; p <= state.k; p++) {
    state.flujos.push({ periodo: p, pago: 0, saldo: 100 });
  }
  
  // Períodos de pago (saldo disminuye)
  for(let p = state.k + 1; p <= state.k + state.np; p++) {
    const progreso = ((p - state.k - 1) / state.np) * 100;
    state.flujos.push({ 
      periodo: p, 
      pago: state.r, 
      saldo: Math.max(0, 100 - progreso) 
    });
  }
}

// 🖼️ GRÁFICA VISUAL
function draw() {
  const c = document.getElementById('grafica');
  const ctx = c.getContext('2d');
  const w = c.parentElement.clientWidth - 64;
  const h = 180;
  c.width = w;
  c.height = h;
  
  ctx.clearRect(0, 0, w, h);
  
  const total = state.flujos.length;
  const space = Math.max(25, (w - 80) / total);
  
  // 📈 Ejes
  ctx.strokeStyle = '#cbd5e1';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(40, 25);
  ctx.lineTo(w - 20, 25);
  ctx.lineTo(w - 20, h - 15);
  ctx.lineTo(40, h - 15);
  ctx.stroke();
  
  // Números períodos
  ctx.fillStyle = '#64748b';
  ctx.font = "11px Inter, sans-serif";
  ctx.textAlign = "center";
  state.flujos.slice(0, 15).forEach((f, i) => {
    const x = 40 + (i * space) + space/2;
    ctx.fillText(f.periodo, x, 22);
  });
  
  // 🔵 Zona GRACIA
  ctx.fillStyle = 'rgba(79, 70, 229, 0.08)';
  ctx.fillRect(40, 25, state.k * space, h - 50);
  
  ctx.fillStyle = '#4f46e5';
  ctx.font = "bold 11px Inter, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("GRACIA", 40 + (state.k * space)/2, 18);
  
  // 🔴 LÍNEA SALDO
  ctx.strokeStyle = '#ef4444';
  ctx.lineWidth = 3;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.beginPath();
  state.flujos.slice(0, 15).forEach((f, i) => {
    const x = 40 + (i * space) + space/2;
    const y = 25 + (f.saldo / 100) * (h - 60);
    if(i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();
  
  // 💰 BARRAS PAGOS
  state.flujos.slice(0, 15).forEach((f, i) => {
    if(f.pago > 0) {
      const x = 40 + (i * space) + space/2;
      const barWidth = 8;
      const barHeight = 20;
      ctx.fillStyle = '#10b981';
      ctx.fillRect(x - barWidth/2, h - 45, barWidth, -barHeight);
      
      // $ en primer pago
      if(i === state.k) {
        ctx.fillStyle = 'white';
        ctx.font = "bold 10px Inter, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("$", x, h - 35);
      }
    }
  });
  
  // 📋 Leyenda
  ctx.textAlign = "left";
  ctx.font = "bold 12px Inter, sans-serif";
  ctx.fillStyle = '#ef4444';
  ctx.fillText("💳 Saldo", 45, h - 5);
  ctx.fillStyle = '#10b981';
  ctx.fillText("💵 Pagos", 120, h - 5);
}
</script>
</body>
</html>
